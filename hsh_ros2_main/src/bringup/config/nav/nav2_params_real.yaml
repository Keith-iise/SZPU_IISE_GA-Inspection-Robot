amcl:
  ros__parameters:
    use_sim_time: False
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # 差速模型
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2  # 移除alpha5（差速模型无需）
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    max_particles: 2000
    update_min_a: 0.3
    update_min_d: 0.3
    laser_model_type: "likelihood_field"
    max_beams: 60
    min_particles: 500
    tf_broadcast: true
    transform_tolerance: 1.0
    scan_topic: /scan


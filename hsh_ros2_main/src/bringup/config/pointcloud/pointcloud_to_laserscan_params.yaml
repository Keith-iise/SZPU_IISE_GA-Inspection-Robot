pointcloud_to_laserscan:
  ros__parameters:
    target_frame: livox_frame
    transform_tolerance: 0.01
    min_height: -5.0
    max_height: 1.4
    angle_min: -3.14159
    angle_max: 3.14159
    angle_increment: 0.0043
    scan_time: 0.3333
    range_min: 0.35
    range_max: 30.0
    use_inf: true
    inf_epsilon: 1.0

    # cloud_in_topic: '/segmentation/obstacle'
    cloud_in_topic: '/livox/lidar'
    scan_out_topic: '/scan'